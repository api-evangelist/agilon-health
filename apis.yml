aid: agilon-health
name: Agilon Health
description: >-
  Agilon Health is a healthcare services company that partners with primary
  care physicians to transform care for seniors through a value-based, total
  care model. The company supports physician groups with a platform that
  combines clinical, operational, and financial capabilities to manage Medicare
  populations. Agilon Health does not publish a public developer API portal.
